<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Precify — Conectando ML</title>
<style>
  body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #0f0f11; color: #f4f4f5; }
  .box { text-align: center; padding: 32px; }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  p { color: #71717a; font-size: 14px; }
</style>
</head>
<body>
<div class="box">
  <div class="icon">✓</div>
  <h2>Conta ML conectada!</h2>
  <p>Pode fechar esta aba e voltar para a extensão.</p>
</div>
<script>
  // Passa o código para a extensão via storage
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    // A extensão detecta a URL e troca o código pelo token
    document.querySelector('h2').textContent = 'Autorizando...';
  }
</script>
</body>
</html>
