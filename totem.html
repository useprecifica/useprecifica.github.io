<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Batidas Digital">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Batidas Digital</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:radial-gradient(ellipse at top,#15151c 0%,#0a0a0c 60%);
  color:#e4e4e8;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100dvh;padding:1.25rem 1.5rem;text-align:center;
  overflow-y:auto;
}
#main{display:flex;flex-direction:column;align-items:center;width:100%;max-width:480px;}
.brand{font-size:11px;font-weight:800;letter-spacing:.12em;color:#555;text-transform:uppercase;margin-bottom:clamp(.5rem,3vh,1.5rem);flex-shrink:0;}

/* ===== RELÓGIO ===== */
.clock-wrap{margin-bottom:.25rem;flex-shrink:0;}
.clock{font-family:'SF Mono',Menlo,monospace;font-weight:800;color:#fff;letter-spacing:-2px;line-height:1;
  font-size:min(18vw,20vh,128px);}
.date{font-size:clamp(13px,2vh,17px);color:#8888a0;margin-top:.5rem;text-transform:capitalize;}

/* ===== MENSAGEM MOTIVACIONAL ===== */
.motiv{
  font-size:clamp(12px,1.8vh,15px);color:#10b981;font-weight:600;
  margin-top:clamp(.75rem,2.5vh,1.5rem);margin-bottom:clamp(1.25rem,3vh,2.25rem);max-width:480px;line-height:1.5;
  opacity:.92;
}

/* ===== PIN ===== */
.pin-label{font-size:clamp(12px,1.8vh,14px);color:#8888a0;margin-bottom:clamp(.75rem,2vh,1.25rem);flex-shrink:0;}
.pin-dots{display:flex;justify-content:center;gap:16px;margin-bottom:clamp(1rem,2.5vh,2rem);flex-shrink:0;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #333;transition:all .15s;}
.pin-dot.filled{background:#10b981;border-color:#10b981;transform:scale(1.1);}
.pin-dots.shake{animation:shake .4s;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-12px)}40%{transform:translateX(12px)}60%{transform:translateX(-9px)}80%{transform:translateX(9px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(8px,1.8vh,14px);width:min(300px,70vw,60vh);flex-shrink:0;}
.pin-key{
  aspect-ratio:1;border-radius:50%;background:#16161a;border:1px solid #24242a;
  font-size:clamp(18px,3vh,26px);font-weight:700;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.pin-key:active{background:#222228;transform:scale(.92);}
.pin-key.ghost{background:transparent;border:none;}

/* ===== CONFIRMAÇÃO ===== */
.confirm-overlay{
  position:fixed;inset:0;z-index:200;display:none;
  align-items:center;justify-content:center;flex-direction:column;gap:.75rem;
  text-align:center;padding:2rem;
}
.confirm-overlay.open{display:flex;}
.confirm-overlay.ok{background:radial-gradient(ellipse at center,#0d2a1e 0%,#0a0a0c 70%);}
.confirm-overlay.err{background:radial-gradient(ellipse at center,#2a0d0d 0%,#0a0a0c 70%);}
.confirm-icon{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:54px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);margin-bottom:.5rem;}
.confirm-overlay.ok .confirm-icon{background:rgba(61,214,140,.16);color:#3dd68c;}
.confirm-overlay.err .confirm-icon{background:rgba(248,113,113,.16);color:#f87171;}
@keyframes popIn{0%{transform:scale(0)}60%{transform:scale(1.18)}100%{transform:scale(1)}}
.confirm-title{font-size:clamp(24px,4vw,34px);font-weight:800;color:#fff;}
.confirm-hora{font-family:'SF Mono',Menlo,monospace;font-size:clamp(36px,7vw,56px);font-weight:800;color:#fff;margin-top:.25rem;}
.confirm-tipo{font-size:14px;color:#8888a0;text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-top:.25rem;}
.confirm-motiv{font-size:clamp(14px,2.2vw,18px);color:#10b981;font-weight:600;max-width:480px;margin-top:1rem;line-height:1.5;}

.error-state{display:flex;flex-direction:column;align-items:center;gap:.75rem;}
.error-state .ic{font-size:48px;}
.error-state .msg{font-size:15px;color:#8888a0;max-width:300px;}
</style>
</head>
<body>

<div class="brand">IW · Batidas Digital</div>

<div id="main">
  <div class="clock-wrap">
    <div class="clock" id="clock">--:--</div>
    <div class="date" id="dateLbl">—</div>
  </div>
  <div class="motiv" id="motiv"></div>
  <div class="pin-label">Digite seu PIN pra bater o ponto</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="pin-pad" id="pinPad">
    <button class="pin-key" data-k="1">1</button>
    <button class="pin-key" data-k="2">2</button>
    <button class="pin-key" data-k="3">3</button>
    <button class="pin-key" data-k="4">4</button>
    <button class="pin-key" data-k="5">5</button>
    <button class="pin-key" data-k="6">6</button>
    <button class="pin-key" data-k="7">7</button>
    <button class="pin-key" data-k="8">8</button>
    <button class="pin-key" data-k="9">9</button>
    <div class="pin-key ghost"></div>
    <button class="pin-key" data-k="0">0</button>
    <button class="pin-key" data-k="del">⌫</button>
  </div>
</div>

<!-- CONFIRMAÇÃO -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-icon" id="confirmIcon">✓</div>
  <div class="confirm-title" id="confirmTitle"></div>
  <div class="confirm-hora" id="confirmHora"></div>
  <div class="confirm-tipo" id="confirmTipo"></div>
  <div class="confirm-motiv" id="confirmMotiv"></div>
</div>

<script>
const SB_URL='https://mcoemytfdrfrtbfbpvqr.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jb2VteXRmZHJmcnRiZmJwdnFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTgyODcsImV4cCI6MjA5NTM3NDI4N30.uJZKW5oUlexLo_XENDCohlchGKlG54Pwt0gvqpuy-i8';
const sb=window.supabase.createClient(SB_URL,SB_KEY);

const params=new URLSearchParams(window.location.search);
const TOKEN=params.get('t');

const MOTIV_GERAL=[
  '✨ Que seu dia seja leve, produtivo e cheio de boas energias.',
  '💪 Um dia de cada vez. Você está construindo algo bom.',
  '🙏 Que hoje seja um dia abençoado pra você e sua família.',
  '🌱 Pequenos passos todos os dias levam a grandes resultados.',
  '☀️ Comece o dia com gratidão — ele é um presente.',
  '🤝 Seu trabalho importa. Obrigado por fazer parte disso.',
  '🔥 Foco no que importa, leveza no resto. Bom trabalho!',
  '💛 Cuide de você também. Um bom dia começa por dentro.'
];
function saudacaoPorHora(){
  const h=new Date().getHours();
  if(h<12) return 'Bom dia';
  if(h<18) return 'Boa tarde';
  return 'Boa noite';
}

function montarMensagem(numero,tipo,nome){
  const saud=saudacaoPorHora();
  if(tipo==='ENTRADA'&&numero===1) return {titulo:saud+' e ótimo trabalho, '+nome+'!',sub:'Entrada registrada'};
  if(tipo==='SAIDA'&&numero===2) return {titulo:'Bom almoço e ótimo descanso, '+nome+'!',sub:'Saída para almoço'};
  if(tipo==='ENTRADA'&&numero===3) return {titulo:saud+' e ótimo trabalho, '+nome+'!',sub:'Volta do almoço'};
  if(tipo==='SAIDA'&&numero===4) return {titulo:saud+' e ótimo descanso, '+nome+'!',sub:'Saída registrada'};
  // Batidas extras (5ª em diante) — casos como saída externa
  if(tipo==='ENTRADA') return {titulo:'Bem-vindo de volta, '+nome+'!',sub:'Entrada registrada'};
  return {titulo:'Até breve, '+nome+'!',sub:'Saída registrada'};
}

function sorteia(arr){return arr[Math.floor(Math.random()*arr.length)];}
function el(id){return document.getElementById(id);}

let pinAtual='';

function atualizarRelogio(){
  const now=new Date();
  const clockEl=el('clock'), dateEl=el('dateLbl');
  if(clockEl) clockEl.textContent=now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  if(dateEl) dateEl.textContent=now.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
}
atualizarRelogio();
setInterval(atualizarRelogio,1000);

const motivEl=el('motiv');
if(motivEl){
  motivEl.style.transition='opacity .3s';
  motivEl.textContent=sorteia(MOTIV_GERAL);
  setInterval(function(){
    const m=el('motiv');
    if(!m)return;
    m.style.opacity='0';
    setTimeout(function(){m.textContent=sorteia(MOTIV_GERAL);m.style.opacity='.92';},300);
  },12000);
}

function renderDots(){
  const dots=document.querySelectorAll('.pin-dot');
  dots.forEach(function(d,i){d.classList.toggle('filled',i<pinAtual.length);});
}

if(!TOKEN){
  const padEl=el('pinPad');
  const labelEl=el('main');
  if(labelEl) labelEl.innerHTML='<div class="clock-wrap"><div class="clock" id="clock">--:--</div><div class="date" id="dateLbl">—</div></div><div class="error-state" style="margin-top:2rem"><div class="ic">🔒</div><div class="msg">Link inválido. Peça o link correto ao administrador do sistema.</div></div>';
} else {
  const pinPad=el('pinPad');
  if(pinPad){
    pinPad.addEventListener('click',function(e){
      const btn=e.target.closest('.pin-key');
      if(!btn||btn.classList.contains('ghost'))return;
      const k=btn.dataset.k;
      if(k==='del'){
        pinAtual=pinAtual.slice(0,-1);
        renderDots();
        return;
      }
      if(pinAtual.length>=4)return;
      pinAtual+=k;
      renderDots();
      if(pinAtual.length===4){
        setTimeout(confirmarPin,150);
      }
    });
  }
}


async function confirmarPin(){
  const{data,error}=await sb.rpc('bater_ponto_kiosk',{p_token:TOKEN,p_pin:pinAtual});

  if(error||!data||data.erro){
    const dotsEl=el('pinDots');
    if(dotsEl){
      dotsEl.classList.add('shake');
      setTimeout(function(){dotsEl.classList.remove('shake');},400);
    }
    pinAtual='';renderDots();
    return;
  }

  pinAtual='';renderDots();
  mostrarConfirmacao(data);
}

function mostrarConfirmacao(data){
  const overlay=el('confirmOverlay');
  if(!overlay)return;
  const nome=data.nome.split(' ')[0];
  const numero=data.numero||1;
  const msg=montarMensagem(numero,data.tipo,nome);
  overlay.className='confirm-overlay open ok';
  const iconEl=el('confirmIcon'), titleEl=el('confirmTitle'), horaEl=el('confirmHora'), tipoEl=el('confirmTipo'), motivEl2=el('confirmMotiv');
  if(iconEl) iconEl.textContent='✓';
  if(titleEl) titleEl.textContent=msg.titulo;
  if(horaEl) horaEl.textContent=data.hora;
  if(tipoEl) tipoEl.textContent=msg.sub;
  if(motivEl2) motivEl2.textContent='';

  setTimeout(function(){
    overlay.classList.remove('open');
  },4000);
}

if('wakeLock' in navigator){
  navigator.wakeLock.request('screen').catch(function(){});
}
</script>
</body>
</html>
